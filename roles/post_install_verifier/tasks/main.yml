---
- name: Copy verification script into container
  ansible.builtin.command:
    cmd: >-
      podman cp
      {{ role_path }}/files/verify-installed-files.py
      {{ verifier_container_name }}:/build/verify-installed-files.py
  changed_when: true

- name: Run post-install file verification
  ansible.builtin.command:
    cmd: >-
      podman exec {{ verifier_container_name }}
      python3.12 /build/verify-installed-files.py
      {{ monitor_build_dir | default('/build') }}/requirements.lock
      {{ verifier_venv_path }}
  register: _verify_result
  failed_when: false
  changed_when: false

- name: Save verification report
  ansible.builtin.copy:
    content: "{{ _verify_result.stdout }}"
    dest: "{{ reports_dir }}/post-install-verify-{{ build_id | default('latest') }}.json"
    mode: "0640"
  when: _verify_result.stdout | default('') | length > 0

- name: Parse verification findings
  ansible.builtin.set_fact:
    _verify_findings: "{{ (_verify_result.stdout | default('{}') | from_json) }}"

- name: Fail on unexpected artifacts
  ansible.builtin.fail:
    msg: >-
      POST-INSTALL VERIFICATION FAILED -- {{ _verify_findings.total_findings }}
      unexpected artifact(s) found after pip install:
      {% for f in _verify_findings.findings %}
      [{{ f.type }}] {{ f.path | default(f.package | default('unknown')) }}
      {% endfor %}
      Full report: {{ reports_dir }}/post-install-verify-{{ build_id | default('latest') }}.json
  when: (_verify_findings.total_findings | default(0) | int) > 0

- name: Post-install verification passed
  ansible.builtin.debug:
    msg: >-
      Post-install verification PASSED: all files on disk match lockfile expectations.
      {{ _verify_findings.expected_packages | default([]) | length }} expected packages,
      zero unexpected artifacts.

- name: Export verification results
  ansible.builtin.set_stats:
    data:
      post_install_verified: true
      post_install_expected_packages: "{{ _verify_findings.expected_packages | default([]) | length }}"
