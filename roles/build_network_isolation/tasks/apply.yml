---
- name: Load network allowlist
  ansible.builtin.include_vars:
    file: "{{ network_allowlist_file }}"
    name: _network_policy

- name: Resolve hostnames to IPs for nftables
  ansible.builtin.command:
    cmd: "getent hosts {{ item.ip }}"
  loop: "{{ _network_policy.allowed_hosts | selectattr('ip', 'match', '[a-zA-Z]') | list }}"
  register: _dns_resolutions
  changed_when: false
  failed_when: _dns_resolutions.rc != 0

- name: Build resolved allowlist
  ansible.builtin.set_fact:
    _resolved_hosts: >-
      {{
        _network_policy.allowed_hosts
        | selectattr('ip', 'match', '^\d')
        | list
        + (_dns_resolutions.results | default([]) | map('combine', {}) | list
           | map('dict2items') | list | flatten
           | selectattr('key', 'equalto', 'stdout')
           | map(attribute='value')
           | map('split', ' ')
           | map('first')
           | list
           | zip(_network_policy.allowed_hosts | selectattr('ip', 'match', '[a-zA-Z]') | list)
           | map('combine')
           | list)
      }}
  ignore_errors: true

- name: Use original allowlist if resolution is complex
  ansible.builtin.set_fact:
    _resolved_hosts: "{{ _network_policy.allowed_hosts }}"
  when: _resolved_hosts is not defined or _resolved_hosts | length == 0

- name: Back up current nftables state
  ansible.builtin.command:
    cmd: "nft list ruleset"
  register: _nft_backup
  changed_when: false

- name: Save nftables backup to file
  ansible.builtin.copy:
    content: "{{ _nft_backup.stdout }}"
    dest: "{{ nftables_state_backup }}"
    mode: "0600"

- name: Deploy build isolation nftables ruleset
  ansible.builtin.template:
    src: build-isolation.nft.j2
    dest: "/etc/nftables/build-isolation.nft"
    mode: "0600"
  vars:
    allowed_hosts: "{{ _network_policy.allowed_hosts }}"
    table_name: "{{ nftables_table_name }}"
    log_prefix: "{{ nftables_log_prefix }}"

- name: Apply build isolation rules
  ansible.builtin.command:
    cmd: "nft -f /etc/nftables/build-isolation.nft"
  changed_when: true

- name: Verify isolation rules are active
  ansible.builtin.command:
    cmd: "nft list table inet {{ nftables_table_name }}"
  register: _verify_rules
  changed_when: false
  failed_when: "'drop' not in _verify_rules.stdout"

- name: Network isolation active
  ansible.builtin.debug:
    msg: >-
      Build network isolation APPLIED. Only {{ _network_policy.allowed_hosts | length }}
      destinations are reachable. All other outbound traffic is dropped and logged
      with prefix '{{ nftables_log_prefix }}'.
