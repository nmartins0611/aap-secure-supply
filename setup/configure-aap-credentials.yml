---
# configure-aap-credentials.yml — Create credential types and credentials
#
# Creates:
#   1. Machine credential for the RHEL target
#   2. Container Registry credential for Quay.io (robot account)
#   3. Slack webhook custom credential type + credential
#   4. SCM credential for the Git repository
#
# Usage:
#   ansible-playbook setup/configure-aap-credentials.yml \
#     -e @setup/vars/deploy-vars.yml

- name: "Configure AAP 2.6 — Credentials"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/deploy-vars.yml

  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ aap_controller_url }}"
      controller_username: "{{ aap_admin_user }}"
      controller_password: "{{ aap_admin_password }}"
      validate_certs: "{{ aap_verify_ssl }}"

  tasks:
    # ── Machine credential ──

    - name: Create machine credential for RHEL target
      ansible.controller.credential:
        name: "Trusted Pipeline Machine"
        description: "SSH credential for the RHEL build/deploy target"
        organization: "{{ aap_organization }}"
        credential_type: "Machine"
        inputs:
          username: "{{ target_user }}"
          become_method: sudo
          become_username: root
        state: present
      tags: [machine]

    # ── Container Registry credential ──

    - name: Create Quay.io registry credential
      ansible.controller.credential:
        name: "Quay.io Registry"
        description: "Robot account for quay.io/{{ quay_namespace }}"
        organization: "{{ aap_organization }}"
        credential_type: "Container Registry"
        inputs:
          host: "{{ quay_registry_url }}"
          username: "{{ quay_robot_account }}"
          password: "{{ quay_robot_token }}"
          verify_ssl: true
        state: present
      tags: [registry]

    # ── Slack webhook custom credential type + credential ──

    - name: Create Slack Webhook credential type
      ansible.controller.credential_type:
        name: "Slack Webhook"
        description: "Incoming webhook URL for Slack notifications"
        kind: cloud
        inputs:
          fields:
            - id: webhook_url
              type: string
              label: "Webhook URL"
              secret: true
          required:
            - webhook_url
        injectors:
          extra_vars:
            slack_webhook_url: "{{ '{{' }} webhook_url {{ '}}' }}"
        state: present
      tags: [slack]

    - name: Create Slack webhook credential
      ansible.controller.credential:
        name: "Trusted Pipeline Slack"
        description: "Slack incoming webhook for pipeline notifications"
        organization: "{{ aap_organization }}"
        credential_type: "Slack Webhook"
        inputs:
          webhook_url: "{{ slack_webhook_url }}"
        state: present
      when: slack_webhook_url | length > 0
      tags: [slack]

    # ── SCM credential ──

    - name: Create SCM credential
      ansible.controller.credential:
        name: "{{ project_scm_credential_name }}"
        description: "Git token for accessing the trusted pipeline repository"
        organization: "{{ aap_organization }}"
        credential_type: "Source Control"
        inputs:
          username: "{{ scm_username }}"
          password: "{{ scm_password }}"
        state: present
      when: scm_password | length > 0
      tags: [scm]

    - name: Display credentials summary
      ansible.builtin.debug:
        msg:
          - "Machine: Trusted Pipeline Machine (user={{ target_user }})"
          - "Registry: Quay.io Registry ({{ quay_registry_url }}/{{ quay_namespace }})"
          - "Slack: {{ 'Trusted Pipeline Slack (configured)' if slack_webhook_url | length > 0 else 'Skipped — no webhook URL' }}"
          - "SCM: {{ project_scm_credential_name if scm_password | length > 0 else 'Skipped — no SCM token' }}"
      tags: [always]
