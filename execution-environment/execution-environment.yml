---
version: 3
images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest

dependencies:
  galaxy:
    collections:
      - containers.podman
      - ansible.posix

  python:
    - pip-audit>=2.7.0
    - pip-tools>=7.4.0

additional_build_steps:
  prepend_builder:
    - RUN microdnf install -y dnf && microdnf clean all
    - >-
      RUN dnf install -y
      systemd-devel
      libxml2-devel
      pkg-config
      && dnf clean all

  prepend_final:
    - RUN microdnf install -y dnf && microdnf clean all
    - >-
      RUN dnf install -y
      systemd-devel
      libxml2-devel
      pkg-config
      skopeo
      jq
      && dnf clean all
    - RUN curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.45.1
    - RUN curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin v0.114.0
    - >-
      RUN curl -sSfL
      https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64
      -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
